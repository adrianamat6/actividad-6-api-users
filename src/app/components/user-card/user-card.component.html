<div class="card h-100 shadow-sm border-1 custom-card">
    <img [src]="user()?.image" class="rounded-circle w-50 d-block mx-auto mt-4 shadow-sm" [alt]="user()?.first_name">
    
    <div class="card-body text-center d-flex flex-column justify-content-between">
        <h5 class="card-title fw-bold text-secondary mt-2">{{ user()?.first_name }} {{ user()?.last_name }}</h5>
        
        <div class="d-flex justify-content-around mt-4 pt-3 border-top border-secondary border-opacity-25">
            
            <a [routerLink]="['/user', user()?._id]" class="card-action">
                <span class="icon">🔍</span>
                <small>Ver detalle</small>
            </a>

            <a [routerLink]="['/updateuser', user()?._id]" class="card-action">
                <span class="icon">🔄</span>
                <small>Actualizar</small>
            </a>

           <a class="card-action delete-action" (click)="onBorrarClick()">
                <span class="icon">🗑️</span>
                <small>Borrar</small>
            </a>

        </div>
    </div>
</div>
